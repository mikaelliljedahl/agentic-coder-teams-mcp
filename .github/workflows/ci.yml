name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"

      - run: uv sync --group dev

      - run: uv run ruff format --check .

      - run: uv run ruff check .

      - run: uv run ty check

      - run: uv run pytest
